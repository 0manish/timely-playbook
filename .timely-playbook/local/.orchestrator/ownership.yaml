# Maps repo paths to agent personas and escalation owners.
areas:
  planner:
    description: "High-level planning, orchestration state, and release packaging"
    owners:
      - orchestrator
    paths:
      - .timely-core/TimelyPlaybook.md
      - .timely-core/Conductor-Orchestration.md
      - .timely-playbook/local/.orchestrator/**
      - .timely-core/tools/orchestrator/**
  frontend:
    description: "UI code, design systems, and client integrations (Project Aurora apps/web + mobile shell)"
    owners:
      - frontend-agent
      - reviewer-agent
    paths:
      - apps/web/**
      - apps/mobile/**
      - ui/**
      - snippets/frontend/**
  backend:
    description: "APIs, services, workers, shared libraries (Project Aurora apps/api + shared packages)"
    owners:
      - backend-agent
      - reviewer-agent
    paths:
      - apps/api/**
      - services/**
      - packages/**
      - snippets/backend/**
  infra:
    description: "Infra-as-code, CI/CD workflows, observability, deployment manifests"
    owners:
      - devops-agent
      - reviewer-agent
    paths:
      - .github/**
      - infra/**
      - deploy/**
      - .timely-playbook/bin/**
      - .timely-core/scripts/**
  docs:
    description: "Process docs, trackers, templates, and governance artefacts"
    owners:
      - docs-agent
      - reviewer-agent
    paths:
      - .timely-core/*.md
      - .timely-playbook/local/AGENTS.md
      - .timely-playbook/local/SKILLS.md
      - .timely-playbook/local/timely-trackers/**
      - .timely-core/templates/**
      - .timely-core/snippets/**
      - .timely-playbook/local/run-logs/**
  tests:
    description: "Unit, integration, smoke, and synthetic tests"
    owners:
      - test-agent
      - reviewer-agent
    paths:
      - .timely-core/tests/**
      - qa/**
      - smoke/**
      - apps/**/test/**

rules:
  default_owner: orchestrator
  do_not_edit:
    - dist/**
    - vendor/**
  escalation_contact: "smoke@example.com"
